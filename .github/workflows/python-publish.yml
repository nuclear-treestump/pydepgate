# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries
# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    # Per-job permissions for build attestations:
    #   contents: read       checkout the repo
    #   id-token: write      OIDC identity for Sigstore signing
    #   attestations: write  publish the attestation to the GitHub
    #                        attestation API so it is queryable
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          python -m pip install build
          python -m build

      # Generate a SLSA-3 build provenance attestation covering both
      # the wheel and the sdist that `python -m build` produced. The
      # action signs via Sigstore using the workflow's OIDC identity
      # and publishes the attestation to GitHub's attestation API
      # plus the Sigstore Rekor transparency log. Output files land
      # next to the distributions and ride along through the artifact
      # upload to the publish job below.
      - name: Generate build provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: 'dist/*'

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build

    permissions:
      contents: read
      # Mandatory for trusted publishing via OIDC.
      id-token: write
      # Required so pypa/gh-action-pypi-publish can attach the
      # attestation produced in release-build to the PyPI upload.
      attestations: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      url: https://pypi.org/p/pydepgate
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      # The pypa/gh-action-pypi-publish action automatically detects
      # the attestation files generated by attest-build-provenance and
      # uploads them to PyPI alongside the wheel. attestations: true
      # is the default in recent versions; we set it explicitly so
      # the intent is documented.
      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true
